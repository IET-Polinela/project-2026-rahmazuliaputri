<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - EnhaReport</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fff1f7, #ffe4f1, #fbcfe8);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            color: #6b214d;
        }

        .card {
            width: 100%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(190, 24, 93, 0.12);
        }

        h1 {
            font-size: 40px;
            color: #9d174d;
            margin-bottom: 18px;
            text-align: center;
        }

        p {
            line-height: 1.9;
            margin-bottom: 12px;
            font-size: 15px;
            text-align: center;
        }

        .contact-box {
            margin-top: 26px;
            display: grid;
            gap: 16px;
        }

        .item {
            background: #fff7fb;
            border: 1px solid #f9a8d4;
            border-radius: 18px;
            padding: 18px 20px;
        }

        .item h2 {
            font-size: 18px;
            color: #be185d;
            margin-bottom: 6px;
        }

        .item p {
            text-align: left;
            margin: 0;
        }

        .btn-group {
            margin-top: 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 999px;
            font-weight: 600;
            display: inline-block;
        }

        .btn-primary {
            background: #ec4899;
            color: white;
        }

        .btn-secondary {
            background: white;
            color: #be185d;
            border: 2px solid #f9a8d4;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Contact EnhaReport</h1>
        <p>
            Jika kamu memiliki pertanyaan, masukan, atau membutuhkan bantuan terkait
            penggunaan EnhaReport, silakan hubungi kontak berikut.
        </p>

        <div class="contact-box">
            <div class="item">
                <h2>Email</h2>
                <p>enhareport@enhacity.com</p>
            </div>

            <div class="item">
                <h2>Phone</h2>
                <p>0812-3456-78907</p>
            </div>

            <div class="item">
                <h2>Address</h2>
                <p>EnhaCity Service Center</p>
            </div>
        </div>

        <div class="btn-group">
            <a href="{% url 'home' %}" class="btn btn-primary">Kembali ke Home</a>
            <a href="{% url 'report_create' %}" class="btn btn-secondary">Laporkan Masalah</a>
        </div>
    </div>
</body>
</html>
