<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Report</title>
</head>
<body>
    <h1>Detail Laporan</h1>

    <h2>{{ report.title }}</h2>
    <p><strong>Kategori:</strong> {{ report.category }}</p>
    <p><strong>Deskripsi:</strong> {{ report.description }}</p>
    <p><strong>Lokasi:</strong> {{ report.location }}</p>
    <p><strong>Status:</strong> {{ report.status }}</p>
    <p><strong>Dibuat pada:</strong> {{ report.created_at }}</p>

    <a href="{% url 'report_list' %}">Kembali</a>
    <a href="{% url 'report_update' report.pk %}">Edit</a>
    <a href="{% url 'report_delete' report.pk %}">Delete</a>
</body>
</html>
