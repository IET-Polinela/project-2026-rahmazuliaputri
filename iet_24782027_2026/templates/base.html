<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}EnhaReport{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #f6e6ee 0%, #efcada 48%, #e8b8cf 100%);
            color: #7a3059;
        }

        .navbar {
            background: #f7e5ee !important;
            border-bottom: 1px solid #efd2de;
        }

        .navbar-brand {
            color: #bf1f6a !important;
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: -0.2px;
        }

        .nav-link {
            color: #973860 !important;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-link:hover {
            color: #bf1f6a !important;
        }

        .page-card,
        .card {
            background: rgba(250, 239, 245, 0.96);
            border: none;
            border-radius: 28px;
            box-shadow: 0 10px 24px rgba(176, 130, 152, 0.08);
        }

        h1, h2, h3, h4, h5 {
            color: #ad1f63;
            font-weight: 700;
        }

        p, li, td, th, label, .lead {
            color: #7a3059;
        }

        .lead {
            font-size: 1.12rem;
            line-height: 1.9;
            font-weight: 400;
        }

        .btn {
            border-radius: 999px;
            font-weight: 600;
            padding: 0.62rem 1.2rem;
            border-width: 2px;
        }

        .btn-primary {
            background: linear-gradient(180deg, #ef58a3 0%, #e83f93 100%);
            border-color: #ef58a3;
            color: #fff;
            box-shadow: 0 8px 20px rgba(232, 63, 147, 0.18);
        }

        .btn-primary:hover {
            background: linear-gradient(180deg, #e84a98 0%, #da2f83 100%);
            border-color: #e84a98;
            color: #fff;
        }

        .btn-secondary {
            background: #fff8fb;
            border-color: #ef9dc4;
            color: #b42b6f;
        }

        .btn-secondary:hover {
            background: #fdeef5;
            border-color: #ea86b5;
            color: #a72265;
        }

        .btn-info {
            background: linear-gradient(180deg, #c78bb2 0%, #b56f9c 100%);
            border-color: #b38bd8;
            color: #fff;
        }

        .btn-info:hover {
            background: linear-gradient(180deg, #bb7ea6 0%, #a95e90 100%);
            border-color: #a67dcd;
            color: #fff;
        }

        .btn-warning {
            background: linear-gradient(180deg, #f4d264 0%, #ecbb47 100%);
            border-color: #f4d264;
            color: #5c4416;
        }

        .btn-warning:hover {
            background: linear-gradient(180deg, #ecbb47 0%, #e2ac2f 100%);
            border-color: #ecbb47;
            color: #5c4416;
        }

        .btn-danger {
            background: linear-gradient(180deg, #f06d81 0%, #e1556d 100%);
            border-color: #f06d81;
            color: #fff;
        }

        .btn-danger:hover {
            background: linear-gradient(180deg, #eb6077 0%, #d94661 100%);
            border-color: #eb6077;
            color: #fff;
        }

        .btn-success {
            background: linear-gradient(180deg, #67c48b 0%, #4db174 100%);
            border-color: #67c48b;
            color: #fff;
        }

        .btn-success:hover {
            background: linear-gradient(180deg, #59bb80 0%, #3f9f67 100%);
            border-color: #59bb80;
            color: #fff;
        }

        .table {
            background-color: rgba(255, 250, 252, 0.98);
            border-radius: 18px;
            overflow: hidden;
        }

        .table thead th {
            background: #4a4045 !important;
            color: #fff !important;
            border-color: #574b52 !important;
            vertical-align: middle;
        }

        .table td {
            background: rgba(255, 250, 252, 0.98);
            border-color: #ead7e1;
            vertical-align: middle;
        }

        .breadcrumb {
            background: transparent;
            padding-left: 0;
            margin-bottom: 1rem;
        }

        .breadcrumb-item a {
            color: #c45c90;
            text-decoration: none;
        }

        .breadcrumb-item a:hover {
            color: #ad1f63;
            text-decoration: underline;
        }

        .breadcrumb-item.active {
            color: #8e5f76;
        }

        .alert-success {
            background: #eaf7ee;
            border: 1px solid #cfe9d8;
            color: #3f7a54;
            border-radius: 16px;
        }

        .form-control,
        .form-select,
        textarea {
            border-radius: 14px;
            border: 1px solid #eccfdd;
            background: #fffafb;
            color: #7a3059;
            padding: 0.8rem 1rem;
        }

        .form-control:focus,
        .form-select:focus,
        textarea:focus {
            border-color: #ea79ad;
            box-shadow: 0 0 0 0.2rem rgba(234, 121, 173, 0.18);
            background: #fffafb;
        }

        .badge {
            border-radius: 999px;
            padding: 0.5em 0.85em;
            font-weight: 600;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container py-2">
        <a class="navbar-brand" href="{% url 'home' %}">EnhaReport</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-lg-2">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'report_list' %}">Reports</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'about' %}">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
</div>

<div class="container mt-4 mb-5">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
