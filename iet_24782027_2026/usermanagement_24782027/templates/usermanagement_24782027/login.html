<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EnhaReport</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(180deg, #f6e6ee 0%, #efcada 48%, #e8b8cf 100%);
            color: #7a3059;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 500px;
            background: rgba(250, 239, 245, 0.97);
            border: none;
            border-radius: 28px;
            box-shadow: 0 10px 24px rgba(176, 130, 152, 0.10);
            overflow: hidden;
        }

        .login-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
        }

        .login-title {
            color: #ad1f63;
            font-weight: 800;
            margin: 0;
            font-size: 2.2rem;
        }

        .login-subtitle {
            color: #8e5f76;
            margin-top: 0.5rem;
            font-size: 0.98rem;
        }

        .login-body {
            padding: 1rem 2rem 2rem;
        }

        .form-label {
            color: #7a3059;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 14px;
            border: 1px solid #eccfdd;
            background: #fffafb;
            color: #7a3059;
            padding: 0.85rem 1rem;
        }

        .form-control:focus {
            border-color: #ea79ad;
            box-shadow: 0 0 0 0.2rem rgba(234, 121, 173, 0.18);
            background: #fffafb;
        }

        .input-group-text {
            border-radius: 14px;
            border: 1px solid #eccfdd;
            background: #fffafb;
            color: #bf1f6a;
            cursor: pointer;
        }

        .btn-login {
            border-radius: 999px;
            font-weight: 600;
            padding: 0.75rem 1.2rem;
            border: 2px solid #ef58a3;
            background: linear-gradient(180deg, #ef58a3 0%, #e83f93 100%);
            color: #fff;
            box-shadow: 0 8px 20px rgba(232, 63, 147, 0.18);
        }

        .btn-login:hover {
            background: linear-gradient(180deg, #e84a98 0%, #da2f83 100%);
            border-color: #e84a98;
            color: #fff;
        }

        .alert-success {
            background: #eaf7ee;
            border: 1px solid #cfe9d8;
            color: #3f7a54;
            border-radius: 16px;
        }

        .alert-danger {
            background: #fdecef;
            border: 1px solid #f5c2c7;
            color: #842029;
            border-radius: 16px;
        }

        .login-link {
            color: #bf1f6a;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link:hover {
            color: #a61b5c;
            text-decoration: underline;
        }

        .brand-text {
            text-align: center;
            margin-bottom: 1rem;
            color: #bf1f6a;
            font-weight: 800;
            font-size: 1.35rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="brand-text">EnhaReport</div>
            <h1 class="login-title">Login</h1>
            <p class="login-subtitle">Masuk ke akunmu untuk melanjutkan</p>
        </div>

        <div class="login-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-3" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            {% if form.errors %}
                <div class="alert alert-danger">
                    Username atau password salah.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" id="id_username" required>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" class="form-control" id="id_password" required>
                        <span class="input-group-text" onclick="togglePassword()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>

            <p class="text-center mt-4 mb-0">
                Belum punya akun? <a href="{% url 'register' %}" class="login-link">Register di sini</a>
            </p>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('id_password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye');
                toggleIcon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye-slash');
                toggleIcon.classList.add('bi-eye');
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
