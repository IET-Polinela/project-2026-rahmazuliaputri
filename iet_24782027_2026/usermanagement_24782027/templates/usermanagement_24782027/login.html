{% extends 'base.html' %}

{% block title %}Login - EnhaReport{% endblock %}

{% block content %}
<style>
    .login-wrapper {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }

    .login-card {
        width: 100%;
        max-width: 500px;
        background: rgba(250, 239, 245, 0.97);
        border: none;
        border-radius: 28px;
        box-shadow: 0 10px 24px rgba(176, 130, 152, 0.10);
        overflow: hidden;
    }

    .login-header {
        text-align: center;
        padding: 2rem 2rem 1rem;
    }

    .login-title {
        color: #ad1f63;
        font-weight: 800;
        margin: 0;
        font-size: 2.2rem;
    }

    .login-subtitle {
        color: #8e5f76;
        margin-top: 0.5rem;
        font-size: 0.98rem;
    }

    .login-body {
        padding: 1rem 2rem 2rem;
    }

    .input-group-text {
        border-radius: 14px;
        border: 1px solid #eccfdd;
        background: #fffafb;
        color: #bf1f6a;
        cursor: pointer;
    }

    .btn-login {
        border-radius: 999px;
        font-weight: 600;
        padding: 0.75rem 1.2rem;
        border: 2px solid #ef58a3;
        background: linear-gradient(180deg, #ef58a3 0%, #e83f93 100%);
        color: #fff;
        box-shadow: 0 8px 20px rgba(232, 63, 147, 0.18);
    }

    .btn-login:hover {
        background: linear-gradient(180deg, #e84a98 0%, #da2f83 100%);
        border-color: #e84a98;
        color: #fff;
    }

    .login-link {
        color: #bf1f6a;
        text-decoration: none;
        font-weight: 500;
    }

    .login-link:hover {
        color: #a61b5c;
        text-decoration: underline;
    }

    .brand-text {
        text-align: center;
        margin-bottom: 1rem;
        color: #bf1f6a;
        font-weight: 800;
        font-size: 1.35rem;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="brand-text">EnhaReport</div>
            <h1 class="login-title">Login</h1>
            <p class="login-subtitle">Masuk ke akunmu untuk melanjutkan</p>
        </div>

        <div class="login-body">
            {% if form.errors %}
                <div class="alert alert-danger">
                    Username atau password salah.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" id="id_username" required>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" class="form-control" id="id_password" required>
                        <span class="input-group-text" onclick="togglePassword()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>

            <p class="text-center mt-4 mb-0">
                Belum punya akun?
                <a href="{% url 'register' %}" class="login-link">Register di sini</a>
            </p>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('id_password');
        const toggleIcon = document.getElementById('toggleIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        }
    }
</script>
{% endblock %}
