{% extends 'base.html' %}

{% block title %}Hapus Laporan - Enha City{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Hapus Laporan</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body">
                <h1 class="h3 mb-3 text-danger">Hapus Laporan - Enha City</h1>

                <p>Apakah kamu yakin ingin menghapus laporan: <strong>{{ object.title }}</strong>?</p>

                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Ya, Hapus</button>
                    <a href="{% url 'report_list' %}" class="btn btn-secondary">Batal</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
