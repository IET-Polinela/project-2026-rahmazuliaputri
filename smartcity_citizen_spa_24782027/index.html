<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnhaCity Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --enha-pink: #d63384;
            --enha-pink-dark: #b31d68;
            --enha-pink-soft: #fff7fb;
            --enha-pink-border: #f4c8dc;
            --enha-text-dark: #202233;
            --enha-text-muted: #6b7280;
            --enha-card-bg: rgba(255, 255, 255, 0.97);
        }

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--enha-text-dark);
            overflow-x: hidden;
            background:
                radial-gradient(circle at 18% 22%, rgba(214, 51, 132, 0.10), transparent 24%),
                radial-gradient(circle at 82% 28%, rgba(255, 138, 190, 0.13), transparent 26%),
                radial-gradient(circle at 50% 88%, rgba(214, 51, 132, 0.10), transparent 32%),
                linear-gradient(135deg, #fff7fb 0%, #fff1f7 42%, #fffafd 70%, #fdeaf3 100%);
        }

        body::before {
            content: "";
            position: fixed;
            top: 178px;
            left: 96px;
            width: 105px;
            height: 72px;
            opacity: 0.42;
            pointer-events: none;
            background-image: radial-gradient(rgba(214, 51, 132, 0.34) 2px, transparent 2px);
            background-size: 14px 14px;
            z-index: 0;
        }

        body::after {
            content: "";
            position: fixed;
            right: 105px;
            bottom: 88px;
            width: 105px;
            height: 72px;
            opacity: 0.38;
            pointer-events: none;
            background-image: radial-gradient(rgba(214, 51, 132, 0.32) 2px, transparent 2px);
            background-size: 14px 14px;
            z-index: 0;
        }

        .navbar {
            position: relative;
            z-index: 5;
        }

        .navbar.bg-enha-pink {
            background-color: var(--enha-pink) !important;
            box-shadow: 0 8px 22px rgba(214, 51, 132, 0.18) !important;
        }

        .navbar-brand {
            color: #ffffff !important;
            font-weight: 800;
            font-size: 1.35rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand i {
            width: 31px;
            height: 31px;
            border-radius: 9px;
            background: rgba(255, 255, 255, 0.18);
            border: 1.5px solid rgba(255, 255, 255, 0.55);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        #nav-menus .btn,
        #nav-menus button,
        #nav-menus a {
            border-radius: 12px !important;
            font-weight: 700 !important;
        }

        .spa-container {
            position: relative;
            z-index: 2;
            min-height: calc(100vh - 80px);
            padding-top: 1.35rem;
            padding-bottom: 2.5rem;
        }

        .bg-enha-pink {
            background-color: var(--enha-pink) !important;
        }

        .btn-enha-pink {
            background-color: var(--enha-pink);
            border: 2px solid var(--enha-pink);
            color: #ffffff;
            border-radius: 12px;
            font-weight: 800;
            box-shadow: 0 10px 24px rgba(214, 51, 132, 0.18);
        }

        .btn-enha-pink:hover {
            background-color: var(--enha-pink-dark);
            border-color: var(--enha-pink-dark);
            color: #ffffff;
        }

        .active-enha-pink {
            background-color: var(--enha-pink) !important;
            border-color: var(--enha-pink) !important;
            color: #ffffff !important;
        }

        .text-enha-pink {
            color: var(--enha-pink) !important;
        }

        .card,
        .list-group,
        .modal-content {
            border: 1px solid var(--enha-pink-border) !important;
            border-radius: 24px !important;
            box-shadow: 0 18px 42px rgba(214, 51, 132, 0.12) !important;
        }

        .card {
            background: var(--enha-card-bg) !important;
        }

        .list-group {
            overflow: hidden;
        }

        .list-group-item {
            border-color: #f3d2e0 !important;
            font-weight: 600;
        }

        .list-group-item.active,
        .list-group-item.active-enha-pink {
            background-color: var(--enha-pink) !important;
            border-color: var(--enha-pink) !important;
            color: #ffffff !important;
            font-weight: 800;
        }

        .btn {
            border-radius: 12px;
            font-weight: 700;
        }

        .btn-outline-secondary {
            border: 2px solid var(--enha-pink) !important;
            color: var(--enha-pink) !important;
            background: #ffffff !important;
        }

        .btn-outline-secondary:hover {
            background: var(--enha-pink) !important;
            color: #ffffff !important;
        }

        .form-control,
        .form-select,
        textarea {
            border-radius: 12px;
            border-color: #e7c5d6;
            font-family: 'Poppins', sans-serif;
        }

        .form-control:focus,
        .form-select:focus,
        textarea:focus {
            border-color: var(--enha-pink);
            box-shadow: 0 0 0 0.18rem rgba(214, 51, 132, 0.14);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--enha-text-dark);
            font-weight: 800;
            letter-spacing: -0.4px;
        }

        p,
        .text-muted {
            color: var(--enha-text-muted) !important;
        }

        .badge {
            border-radius: 999px;
            padding: 7px 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
        }

        .modal {
            z-index: 1055 !important;
        }

        .modal-dialog {
            pointer-events: auto !important;
        }

        .modal-content {
            background: #ffffff !important;
            opacity: 1 !important;
            overflow: hidden;
            pointer-events: auto !important;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--enha-pink), var(--enha-pink-dark)) !important;
            color: #ffffff !important;
            border-bottom: none !important;
            padding: 1.1rem 1.35rem;
        }

        .modal-title {
            color: #ffffff !important;
            font-weight: 800;
        }

        .modal-body {
            background: #ffffff !important;
        }

        .modal-footer {
            background: #fff7fb !important;
            border-top: 1px solid var(--enha-pink-border) !important;
        }

        .modal-backdrop {
            z-index: 1050 !important;
            background-color: #000 !important;
        }

        .modal-backdrop.show {
            opacity: 0.26 !important;
        }

        @media (max-width: 991px) {
            body::before,
            body::after {
                display: none;
            }

            .navbar-brand {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-enha-pink shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#dashboard">
                <i class="bi bi-buildings-fill me-2"></i>EnhaCity Portal
            </a>

            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-enha-pink text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label for="inputTitle" class="form-label fw-semibold">Judul Laporan</label>
                            <input type="text" class="form-control" id="inputTitle" required>
                        </div>

                        <div class="mb-3">
                            <label for="inputCategory" class="form-label fw-semibold">Kategori</label>
                            <select class="form-select" id="inputCategory" required>
                                <option value="">Pilih kategori laporan</option>
                                <option value="Infrastruktur">Infrastruktur</option>
                                <option value="Kebersihan">Kebersihan</option>
                                <option value="Keamanan">Keamanan</option>
                                <option value="Transportasi">Transportasi</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="inputLocation" class="form-label fw-semibold">Lokasi</label>
                            <input type="text" class="form-control" id="inputLocation" required>
                        </div>

                        <div class="mb-3">
                            <label for="inputDescription" class="form-label fw-semibold">Deskripsi</label>
                            <textarea class="form-control" id="inputDescription" rows="4" required></textarea>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft">
                        Simpan Draft
                    </button>
                    <button type="button" class="btn btn-enha-pink fw-bold px-4" id="btnSubmit">
                        Ajukan <i class="bi bi-send-fill ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
