<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnhaCity Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink: #d63384;
            --pink-dark: #b31d68;
            --pink-soft: #fff7fb;
            --pink-border: #f4c8dc;
            --text-dark: #202233;
            --text-muted: #6b7280;
            --card-bg: rgba(255, 255, 255, 0.97);
        }

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
            background:
                radial-gradient(circle at 18% 22%, rgba(214, 51, 132, 0.10), transparent 24%),
                radial-gradient(circle at 82% 28%, rgba(255, 138, 190, 0.13), transparent 26%),
                radial-gradient(circle at 50% 88%, rgba(214, 51, 132, 0.10), transparent 32%),
                linear-gradient(135deg, #fff7fb 0%, #fff1f7 42%, #fffafd 70%, #fdeaf3 100%);
        }

        body::before {
            content: "";
            position: fixed;
            top: 178px;
            left: 96px;
            width: 105px;
            height: 72px;
            opacity: 0.35;
            pointer-events: none;
            background-image: radial-gradient(rgba(214, 51, 132, 0.34) 2px, transparent 2px);
            background-size: 14px 14px;
            z-index: -1;
        }

        body::after {
            content: "";
            position: fixed;
            right: 105px;
            bottom: 88px;
            width: 105px;
            height: 72px;
            opacity: 0.32;
            pointer-events: none;
            background-image: radial-gradient(rgba(214, 51, 132, 0.32) 2px, transparent 2px);
            background-size: 14px 14px;
            z-index: -1;
        }

        .spa-container {
            min-height: calc(100vh - 80px);
            position: relative;
            z-index: 1;
        }

        .navbar {
            padding-top: 1rem;
            padding-bottom: 1rem;
        }

        .bg-enha-pink {
            background-color: var(--pink) !important;
            box-shadow: 0 8px 22px rgba(214, 51, 132, 0.18);
        }

        .navbar-brand {
            color: #ffffff !important;
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.4px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 31px;
            height: 31px;
            border-radius: 9px;
            background: rgba(255, 255, 255, 0.18);
            border: 1.5px solid rgba(255, 255, 255, 0.55);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg {
            display: block;
        }

        .btn-enha-pink {
            background-color: var(--pink);
            border: 2px solid var(--pink);
            color: #ffffff;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(214, 51, 132, 0.18);
        }

        .btn-enha-pink:hover {
            background-color: var(--pink-dark);
            border-color: var(--pink-dark);
            color: #ffffff;
        }

        .btn-outline-secondary {
            border: 2px solid var(--pink);
            color: var(--pink);
            border-radius: 12px;
            font-weight: 700;
            background: #ffffff;
        }

        .btn-outline-secondary:hover {
            background: var(--pink);
            border-color: var(--pink);
            color: #ffffff;
        }

        .btn-light {
            background: #ffffff;
            color: var(--pink) !important;
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 9px 18px;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .btn-light:hover {
            background: #ffe6f2;
            color: var(--pink-dark) !important;
        }

        .active-enha-pink {
            background-color: var(--pink) !important;
            border-color: var(--pink) !important;
            color: #ffffff !important;
            font-weight: 700;
        }

        .text-enha-pink {
            color: var(--pink) !important;
        }

        .card,
        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--pink-border) !important;
            border-radius: 24px !important;
            box-shadow: 0 18px 42px rgba(214, 51, 132, 0.12) !important;
        }

        .list-group {
            border-radius: 14px;
            overflow: hidden;
        }

        .list-group-item {
            border-color: #f5d5e5;
            padding: 0.9rem 1rem;
            font-weight: 500;
        }

        .list-group-item:not(.active-enha-pink) {
            color: var(--text-dark);
            background: #ffffff;
        }

        .list-group-item:hover {
            background: #fff1f7;
            color: var(--pink-dark);
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--text-dark);
            font-weight: 800;
            letter-spacing: -0.4px;
        }

        p,
        .text-muted {
            color: var(--text-muted) !important;
        }

        .form-control,
        .form-select,
        textarea {
            border-radius: 12px;
            border-color: #f1c3d8;
        }

        .form-control:focus,
        .form-select:focus,
        textarea:focus {
            border-color: var(--pink);
            box-shadow: 0 0 0 0.18rem rgba(214, 51, 132, 0.14);
        }

        .modal {
            z-index: 1055 !important;
        }

        .modal-dialog {
            pointer-events: auto !important;
        }

        .modal-content {
            background: #ffffff !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        .modal-header {
            background: var(--pink) !important;
            border-bottom: none;
            border-radius: 24px 24px 0 0 !important;
        }

        .modal-title {
            color: #ffffff !important;
            font-weight: 800;
        }

        .modal-footer {
            border-top: 1px solid #f5d5e5;
        }

        .modal-backdrop {
            z-index: 1050 !important;
            background-color: #000 !important;
        }

        .modal-backdrop.show {
            opacity: 0.26 !important;
        }

        .badge {
            border-radius: 20px;
            padding: 7px 10px;
            font-family: 'Poppins', sans-serif;
        }

        .progress {
            border-radius: 20px;
            background-color: #f7dce9;
        }

        .progress-bar {
            border-radius: 20px;
        }

        .page-link {
            color: var(--pink);
            border-color: #f1c3d8;
            font-weight: 600;
        }

        .page-link:hover {
            color: var(--pink-dark);
            background-color: #fff1f7;
            border-color: #f1c3d8;
        }

        .page-item.active .page-link {
            background-color: var(--pink);
            border-color: var(--pink);
            color: #ffffff;
        }

        .page-item.disabled .page-link {
            color: #9ca3af;
        }

        .spinner-border {
            width: 2rem;
            height: 2rem;
        }

        @media (max-width: 991px) {
            body::before,
            body::after {
                display: none;
            }

            .navbar-brand {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-enha-pink shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#dashboard">
                <span class="brand-icon">
                    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 16H16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M4 16V8L11 4.4V16H4Z" fill="white"/>
                        <path d="M11 16V2.5L15 4.4V16H11Z" fill="white"/>
                        <rect x="5.8" y="9" width="1.25" height="1.25" rx="0.18" fill="#d63384"/>
                        <rect x="8.2" y="7.9" width="1.25" height="1.25" rx="0.18" fill="#d63384"/>
                        <rect x="5.8" y="12" width="1.25" height="1.25" rx="0.18" fill="#d63384"/>
                        <rect x="8.2" y="10.9" width="1.25" height="1.25" rx="0.18" fill="#d63384"/>
                        <rect x="12.4" y="5.9" width="1.05" height="1.05" rx="0.16" fill="#d63384"/>
                        <rect x="12.4" y="8.5" width="1.05" height="1.05" rx="0.16" fill="#d63384"/>
                        <rect x="12.4" y="11.1" width="1.05" height="1.05" rx="0.16" fill="#d63384"/>
                    </svg>
                </span>
                <span>EnhaCity Portal</span>
            </a>

            <div id="nav-menu" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <!-- Modal Form Laporan -->
    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-enha-pink text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label for="reportTitle" class="form-label">Judul Laporan</label>
                            <input type="text" class="form-control" id="reportTitle" required>
                        </div>

                        <div class="mb-3">
                            <label for="reportCategory" class="form-label">Kategori</label>
                            <select class="form-select" id="reportCategory" required>
                                <option value="">Pilih kategori laporan</option>
                                <option value="INFRASTRUKTUR">Infrastruktur</option>
                                <option value="KEBERSIHAN">Kebersihan</option>
                                <option value="KEAMANAN">Keamanan</option>
                                <option value="TRANSPORTASI">Transportasi</option>
                                <option value="LAINNYA">Lainnya</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="reportLocation" class="form-label">Lokasi</label>
                            <input type="text" class="form-control" id="reportLocation" required>
                        </div>

                        <div class="mb-3">
                            <label for="reportDescription" class="form-label">Deskripsi</label>
                            <textarea class="form-control" id="reportDescription" rows="4" required></textarea>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary fw-bold px-4" id="btnDraft">
                        Simpan Draft
                    </button>
                    <button type="button" class="btn btn-enha-pink fw-bold px-4" id="btnSubmitReport">
                        Ajukan <i class="bi bi-send-fill ms-1"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS dibutuhkan agar modal bisa muncul -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
